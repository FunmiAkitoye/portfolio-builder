<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Settings</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="form-container">
    <h2>Account Settings</h2>

    <label>Profile Picture</label>
    <input type="file" id="settingsImage" accept="image/*">

    <input type="text" id="settingsName" placeholder="Full Name">
    <input type="email" id="settingsEmail" placeholder="Email">
    <input type="password" id="settingsPassword" placeholder="New Password">

    <button type="button" onclick="updateSettings()">Save Changes</button>

    <a href="dashboard.html">
      <button class="secondary-btn">Back to Dashboard</button>
    </a>
    <button id="deleteAccountBtn" class="danger-btn">Delete Account</button>

  </div>

  <script src="settings.js"></script>
</body>
</html>
